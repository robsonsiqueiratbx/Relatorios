<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubrax | Checklist de Operação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --navy: #002147;
            --turquoise: #00CED1;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }

        .text-navy { color: var(--navy); }
        .bg-navy { background-color: var(--navy); }
        .text-turquoise { color: var(--turquoise); }
        .bg-turquoise { background-color: var(--turquoise); }
        .border-turquoise { border-color: var(--turquoise); }

        .checkbox-custom:checked + span {
            text-decoration: line-through;
            color: #94a3b8;
        }
        
        .checkbox-custom:disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        .progress-transition {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-preview {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid var(--turquoise);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-accent {
            border-left: 5px solid var(--navy);
        }

        .input-focus:focus {
            outline: none;
            border-color: var(--turquoise);
            box-shadow: 0 0 0 3px rgba(0, 206, 209, 0.2);
        }

        /* Success Message Modal */
        #success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 33, 71, 0.8);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card-accent { border-left: 5px solid #000; }
            .bg-navy { background-color: #000 !important; }
            .text-turquoise { color: #000 !important; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <!-- Success Modal -->
    <div id="success-modal" class="no-print">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl border-t-8 border-turquoise">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-xl font-black text-navy uppercase mb-2">Checklist Finalizado!</h3>
            <p class="text-slate-600 text-sm mb-6">Os dados foram registrados com sucesso para o operador <span id="modal-op-name" class="font-bold text-navy"></span>.</p>
            <button onclick="closeModal()" class="w-full py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-all">OK</button>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="h-2 bg-turquoise no-print"></div>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="bg-white rounded-xl shadow-lg p-6 mb-8 border border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-navy p-3 rounded-lg">
                        <span class="text-white font-black text-xl tracking-tighter italic">TUBRAX</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-navy uppercase tracking-tight">Checklist de Operação</h1>
                        <p class="text-slate-500 text-sm font-medium" id="current-date"></p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 no-print">
                    <button onclick="resetChecklist()" class="px-4 py-2 text-xs font-bold uppercase tracking-wider text-slate-400 hover:text-red-600 transition-colors">
                        Limpar
                    </button>
                    <button onclick="window.print()" class="px-5 py-2.5 text-xs font-bold uppercase tracking-wider bg-navy text-white hover:bg-slate-800 rounded shadow-md transition-all active:scale-95">
                        Exportar PDF
                    </button>
                </div>
            </div>

            <!-- Operator Name Field -->
            <div class="mt-8 p-4 bg-slate-50 rounded-lg border border-slate-200">
                <label for="operator-name" class="block text-[10px] font-black uppercase tracking-widest text-navy mb-2">Nome do Operador (Obrigatório)</label>
                <input type="text" id="operator-name" placeholder="Digite seu nome completo" 
                    class="w-full px-4 py-3 bg-white border border-slate-300 rounded-md text-sm font-semibold text-navy input-focus transition-all"
                    oninput="saveOperatorName(this.value)">
            </div>

            <!-- Progress -->
            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="flex justify-between items-end mb-3">
                    <span class="text-xs font-bold uppercase text-slate-500 tracking-widest">Conclusão do Turno</span>
                    <span class="text-lg font-black text-turquoise" id="progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-turquoise h-full progress-transition w-0"></div>
                </div>
            </div>
        </header>

        <!-- Checklist Content -->
        <div id="checklist-container" class="space-y-6">
            <!-- JS Injection -->
        </div>

        <!-- Finish Button Area -->
        <div class="mt-10 no-print">
            <button id="finish-btn" onclick="finishChecklist()" 
                class="w-full py-5 bg-navy text-white text-sm font-black uppercase tracking-[0.2em] rounded-xl shadow-xl hover:bg-slate-800 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-turquoise" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Finalizar Checklist
            </button>
            <p id="finish-error" class="text-center text-[10px] text-red-500 font-bold uppercase mt-4 hidden">
                Complete todos os itens e fotos antes de finalizar.
            </p>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center border-t border-slate-200 pt-8 pb-12">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">
                Grupo TBX
            </p>
        </footer>
    </div>

    <script>
        const checklistData = [
            {
                title: "⚙️ Prensas Hidráulicas (PH 01 - 04)",
                items: [
                    { id: "ph1", text: "Nível de óleo e pressão hidráulica nominal." },
                    { id: "ph2", text: "Integridade das cortinas de luz e botões de emergência." },
                    { id: "ph3", text: "Verificação de vazamentos (Mangueiras/Cilindros)." },
                    { id: "ph4", text: "Lubrificação das guias de bronze." }
                ]
            },
            {
                title: "🔨 Prensas Excêntricas (PE 05 - 06)",
                items: [
                    { id: "pe1", text: "Lubrificação biela e virabrequim." },
                    { id: "pe2", text: "Teste de engate e freio dinâmico." }
                ]
            },
            {
                title: "🧼 Processo: Lavagem e Recozimento",
                items: [
                    { id: "lv1", text: "Lavadora: Temperatura e concentração de detergente." },
                    { id: "tr1", text: "Tanque Recozimento: Calibração de temp. (Aço 201/304)." },
                    { id: "tr2", text: "Tanque Recozimento: Solução de resfriamento." }
                ]
            },
            {
                title: "📄 Qualidade do Material",
                items: [
                    { id: "mat1", text: "Certificado de Lote e Espessura (Micrômetro)." },
                    { id: "mat2", text: "Inspeção de superfície: Ausência de riscos/rebarbas." }
                ]
            },
            {
                title: "🦺 Segurança e Organização (5S)",
                items: [
                    { id: "seg1", text: "EPIs específicos (Luva anticorte/Protetor/Óculos)." },
                    { id: "seg2", text: "Segregação de scrap e organização de paletes." }
                ]
            }
        ];

        function initApp() {
            const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', options);
            
            const savedName = localStorage.getItem('operator_name');
            if (savedName) {
                document.getElementById('operator-name').value = savedName;
            }

            renderChecklist();
            updateProgress();
        }

        function saveOperatorName(name) {
            localStorage.setItem('operator_name', name);
            renderChecklist();
            updateProgress();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const operatorName = localStorage.getItem('operator_name') || "";
            const isNameFilled = operatorName.trim().length > 3;

            container.innerHTML = '';

            checklistData.forEach(section => {
                const sectionHtml = `
                    <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden card-accent">
                        <div class="bg-navy px-6 py-4">
                            <h2 class="font-black text-white text-xs uppercase tracking-widest">${section.title}</h2>
                        </div>
                        <div class="p-6 space-y-8">
                            ${section.items.map(item => {
                                const savedPhoto = localStorage.getItem(`photo_${item.id}`);
                                const isChecked = localStorage.getItem(item.id) === 'true';
                                const canCheck = savedPhoto && isNameFilled;
                                
                                return `
                                <div class="relative flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div class="flex items-start gap-4 flex-1">
                                        <input type="checkbox" id="${item.id}" 
                                            class="checkbox-custom mt-1 w-6 h-6 rounded border-slate-300 text-turquoise focus:ring-turquoise transition-all cursor-pointer"
                                            onchange="handleCheck('${item.id}')"
                                            ${isChecked ? 'checked' : ''}
                                            ${!canCheck ? 'disabled' : ''}>
                                        
                                        <div class="flex-1">
                                            <span class="text-sm font-bold text-navy block mb-3">${item.text}</span>
                                            
                                            <div class="flex items-center gap-4">
                                                <div class="no-print">
                                                    <label for="file_${item.id}" class="inline-flex items-center px-4 py-2 bg-slate-100 hover:bg-turquoise hover:text-white rounded text-[10px] font-black uppercase tracking-tighter text-slate-600 cursor-pointer transition-all">
                                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                                        </svg>
                                                        ${savedPhoto ? 'Trocar Foto' : 'Anexar Foto'}
                                                    </label>
                                                    <input type="file" id="file_${item.id}" accept="image/*" capture="environment" class="hidden" onchange="handleFileUpload(this, '${item.id}')">
                                                </div>

                                                <div class="no-print flex items-center gap-2">
                                                    ${!isNameFilled ? `
                                                        <span class="text-[8px] text-red-500 font-bold uppercase tracking-widest">Preencha o Nome</span>
                                                    ` : !savedPhoto ? `
                                                        <span class="text-[8px] text-amber-500 font-bold uppercase tracking-widest">Aguardando Foto</span>
                                                    ` : `
                                                        <span class="text-[8px] text-green-500 font-bold uppercase tracking-widest">Pronto para Check</span>
                                                    `}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div id="preview_container_${item.id}" class="${savedPhoto ? 'flex' : 'hidden'} justify-end">
                                        <img src="${savedPhoto || ''}" id="img_${item.id}" class="image-preview" alt="Evidência Tubrax">
                                    </div>
                                </div>
                                <hr class="border-slate-50 last:hidden">
                            `}).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += sectionHtml;
            });
        }

        async function handleFileUpload(input, id) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                localStorage.setItem(`photo_${id}`, base64Data);
                renderChecklist(); 
                updateProgress();
            };
            reader.readAsDataURL(file);
        }

        function handleCheck(id) {
            const checkbox = document.getElementById(id);
            localStorage.setItem(id, checkbox.checked);
            updateProgress();
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            const percentage = Math.round((checked.length / checkboxes.length) * 100) || 0;

            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = percentage + '%';
            document.getElementById('progress-text').innerText = percentage + '%';
            
            if (percentage === 100) {
                progressBar.classList.add('bg-green-500');
                progressBar.classList.remove('bg-turquoise');
            } else {
                progressBar.classList.remove('bg-green-500');
                progressBar.classList.add('bg-turquoise');
            }

            return percentage;
        }

        function finishChecklist() {
            const progress = updateProgress();
            const operatorName = (localStorage.getItem('operator_name') || "").trim();
            const errorMsg = document.getElementById('finish-error');

            if (progress === 100 && operatorName.length > 3) {
                errorMsg.classList.add('hidden');
                document.getElementById('modal-op-name').innerText = operatorName;
                document.getElementById('success-modal').style.display = 'flex';
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('success-modal').style.display = 'none';
        }

        function resetChecklist() {
            if (confirm("ATENÇÃO: Deseja apagar todos os registros, fotos e nome do operador?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
